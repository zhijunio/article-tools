<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.ico" sizes="any">
  <title>封面生成器 · Cover Maker</title>
  <script src="vendor/html-to-image.min.js"></script>
  <style>
    @font-face {
      font-family: 'Noto Serif SC';
      src: url('fonts/NotoSerifSC-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Noto Serif SC';
      src: url('fonts/NotoSerifSC-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Noto Serif SC';
      src: url('fonts/NotoSerifSC-Black.otf') format('opentype');
      font-weight: 900;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'JetBrains Mono';
      src: url('fonts/JetBrainsMono-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'JetBrains Mono';
      src: url('fonts/JetBrainsMono-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'FFMiSans';
      src: url('fonts/MiSans-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: #f0f2f5;
      font-family: 'Noto Serif SC', serif;
    }

    /* ── App Header ── */
    .app-header {
      height: 52px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      flex: none;
    }

    .home-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      color: #9ca3af;
      text-decoration: none;
      flex: none;
      transition: background 0.15s, color 0.15s;
    }

    .home-link:hover { background: #f3f4f6; color: #374151; }

    .header-logo {
      font-size: 14px;
      font-weight: 700;
      color: #111;
      font-family: sans-serif;
      letter-spacing: 0.02em;
      flex: none;
    }

    .header-ratio {
      font-size: 11px;
      font-family: sans-serif;
      color: #9ca3af;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: #f3f4f6;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .header-spacer {
      flex: 1;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      flex: none;
      align-items: center;
    }

    .header-local-hint {
      font-size: 11px;
      font-family: sans-serif;
      color: #9ca3af;
      white-space: nowrap;
      user-select: none;
    }

    .btn {
      padding: 7px 14px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-family: sans-serif;
      letter-spacing: 0.02em;
      background: #f9fafb;
      color: #374151;
      transition: all 0.15s;
    }

    .btn:hover {
      background: #f3f4f6;
      border-color: #d1d5db;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }

    .btn-primary:hover {
      background: #1d4ed8;
      border-color: #1d4ed8;
    }

    /* ── Main layout: 3 columns, fills remaining vh ── */
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr 320px;
      height: calc(100vh - 52px);
      overflow: hidden;
    }

    /* ── Side panels ── */
    .panel {
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #e5e7eb transparent;
    }

    .panel::-webkit-scrollbar {
      width: 4px;
    }

    .panel::-webkit-scrollbar-thumb {
      background: #e5e7eb;
      border-radius: 2px;
    }

    .panel-left {
      border-right: 1px solid #e5e7eb;
    }

    .panel-right {
      border-left: 1px solid #e5e7eb;
    }

    .panel-body {
      padding: 14px 14px 20px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Panel sections ── */
    .psec {
      padding: 14px 0 10px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .psec:last-child {
      border-bottom: none;
    }

    .psec:first-child {
      padding-top: 4px;
    }

    .psec-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2px;
    }

    .psec-title {
      font-size: 10px;
      font-weight: 700;
      color: #9ca3af;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: sans-serif;
    }

    /* ── Fields ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .field label {
      font-size: 10px;
      font-weight: 600;
      color: #6b7280;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: sans-serif;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      padding: 7px 9px;
      font-size: 12px;
      font-family: sans-serif;
      color: #111;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      outline: none;
      resize: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      line-height: 1.5;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      background: #fff;
    }

    .field input:disabled,
    .field textarea:disabled,
    .field select:disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .field textarea {
      height: 62px;
    }

    .field textarea.tall {
      height: 82px;
    }

    .field select {
      cursor: pointer;
    }

    /* ── Sliders ── */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .slider-row input[type=range] {
      flex: 1;
      accent-color: #2563eb;
      cursor: pointer;
    }

    .slider-val {
      font-size: 10px;
      font-family: sans-serif;
      color: #374151;
      min-width: 42px;
      text-align: right;
    }

    /* ── Field actions group (toggle + color) ── */
    .field-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Visibility toggle ── */
    .vis-toggle {
      font-size: 10px;
      font-family: sans-serif;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      color: #9ca3af;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .vis-toggle.on {
      background: #dcfce7;
      border-color: #86efac;
      color: #16a34a;
    }

    /* ── Color swatch (text color override) ── */
    .color-swatch {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 1.5px solid rgba(0, 0, 0, 0.1);
      cursor: pointer;
      padding: 1px;
      background: none;
      flex: none;
      transition: border-color 0.15s;
    }

    .color-swatch:hover {
      border-color: rgba(0, 0, 0, 0.25);
    }

    .color-swatch::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    .color-swatch::-webkit-color-swatch {
      border: none;
      border-radius: 2px;
    }

    .color-swatch::-moz-color-swatch {
      border: none;
      border-radius: 2px;
    }

    /* ── Ratio picker ── */
    .ratio-picker {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }

    .ratio-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px 4px;
      border: 1.5px solid #e5e7eb;
      border-radius: 6px;
      background: #f9fafb;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .ratio-btn:hover {
      border-color: #93c5fd;
      background: #eff6ff;
    }

    .ratio-btn.active {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .ratio-icon {
      border: 2px solid #9ca3af;
      border-radius: 2px;
      background: #e5e7eb;
      transition: border-color 0.15s, background 0.15s;
    }

    .ratio-btn.active .ratio-icon {
      border-color: #2563eb;
      background: #bfdbfe;
    }

    .ratio-btn span {
      font-size: 9px;
      font-family: sans-serif;
      color: #6b7280;
      letter-spacing: 0.03em;
      line-height: 1;
    }

    .ratio-btn.active span {
      color: #1d4ed8;
      font-weight: 600;
    }

    /* ── Color swatches ── */
    .color-picker {
      display: grid;
      grid-template-columns: repeat(8, 28px);
      gap: 7px;
      align-items: start;
    }

    /* 渐变色行第 8 列占位，与「自定义」纯色列对齐（渐变无「取色」对应项） */
    .color-picker-spacer {
      width: 28px;
      height: 28px;
      pointer-events: none;
    }

    /* ── Color mode groups (纯色 / 渐变色) ── */
    .color-modes {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .color-mode-label {
      font-size: 9px;
      font-weight: 700;
      color: #b0b8c4;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: sans-serif;
      margin-bottom: 3px;
    }

    .color-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      padding: 0;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.15s;
      outline: none;
    }

    .color-btn:hover {
      transform: scale(1.12);
    }

    .color-btn.active {
      outline: 3px solid #111;
      outline-offset: 2px;
    }

    /* ── Custom solid-color button ── */
    .color-btn-custom {
      background: conic-gradient(#ef4444, #f97316, #eab308, #22c55e, #3b82f6, #8b5cf6, #ef4444);
      position: relative;
      overflow: hidden;
    }

    .color-btn-custom::after {
      content: '+';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 900;
      font-family: sans-serif;
      color: #fff;
      background: rgba(0, 0, 0, 0.18);
      pointer-events: none;
    }

    .color-btn-custom input[type="color"] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      border: none;
      padding: 0;
    }

    /* Hide "+" once a custom color has been picked */
    .color-btn-custom.has-custom::after {
      display: none;
    }

    /* ── Deco picker ── */
    .deco-picker {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .deco-btn {
      padding: 7px 10px;
      font-size: 12px;
      font-family: sans-serif;
      text-align: left;
      border: 1.5px solid #e5e7eb;
      border-radius: 6px;
      background: #f9fafb;
      cursor: pointer;
      color: #374151;
      transition: all 0.15s;
    }

    .deco-btn:hover {
      border-color: #93c5fd;
      background: #eff6ff;
    }

    .deco-btn.active {
      border-color: #2563eb;
      background: #eff6ff;
      color: #1d4ed8;
      font-weight: 600;
    }

    /* ── Center: preview + presets ── */
    .preview-area {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      background: #f5f6f8;
    }

    .cover-zone {
      flex: 1;
      min-height: 0;
      padding: 24px 28px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .cover-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .cover-wrapper .cover {
      flex: none;
      width: 100%;
    }

    /* ── Cover ── */
    .cover {
      --c-bg: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 50%, #2563eb 100%);
      --c-glow1: rgba(96, 165, 250, 0.2);
      --c-glow2: rgba(147, 197, 253, 0.15);
      --c-blob: rgba(59, 130, 246, 0.4);
      --c-label: #93c5fd;
      --c-title: #ffffff;
      --c-subtitle: rgba(191, 219, 254, 0.85);
      --c-meta: rgba(191, 219, 254, 0.8);
      --c-meta-line: rgba(191, 219, 254, 0.5);
      --c-accent: #60a5fa;
      --c-font: 'Noto Serif SC', serif;

      position: relative;
      width: 100%;
      background: var(--c-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.18);
      overflow: hidden;
      container-type: inline-size;
      border-radius: 4px;
      aspect-ratio: 1200 / 480;
      font-family: var(--c-font);
    }

    .cover::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60cqi 80cqi at 15% 50%, var(--c-glow1) 0%, transparent 70%),
        radial-gradient(ellipse 40cqi 60cqi at 85% 30%, var(--c-glow2) 0%, transparent 70%);
    }

    /* ── Decoration elements ── */
    .deco-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .deco-grid.classic {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .deco-grid.cyberpunk {
      background-image:
        linear-gradient(rgba(239, 68, 68, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(239, 68, 68, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .deco-grid.sphere {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    .deco-scan {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 0%, rgba(239, 68, 68, 0.04) 50%, transparent 100%);
      background-size: 100% 8px;
      animation: scan 8s linear infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0% {
        background-position: 0 -100%;
      }

      100% {
        background-position: 0 100%;
      }
    }

    .deco-hud {
      position: absolute;
      width: 3cqi;
      height: 3cqi;
    }

    .deco-hud::before,
    .deco-hud::after {
      content: '';
      position: absolute;
      background: var(--c-accent);
      opacity: 0.6;
    }

    .deco-hud::before {
      width: 100%;
      height: 1.5px;
      top: 0;
      left: 0;
    }

    .deco-hud::after {
      width: 1.5px;
      height: 100%;
      top: 0;
      left: 0;
    }

    .deco-hud-tl {
      top: 2cqi;
      left: 2cqi;
    }

    .deco-hud-tr {
      top: 2cqi;
      right: 2cqi;
      transform: scaleX(-1);
    }

    .deco-hud-bl {
      bottom: 2cqi;
      left: 2cqi;
      transform: scaleY(-1);
    }

    .deco-hud-br {
      bottom: 2cqi;
      right: 2cqi;
      transform: scale(-1);
    }

    .deco-line {
      position: absolute;
      left: 6cqi;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 33cqi;
      background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.6), transparent);
    }

    .deco-line.cyberpunk {
      width: 2px;
      background: linear-gradient(to bottom, transparent, var(--c-accent), transparent);
    }

    .deco-line.cyberpunk::after {
      content: '';
      position: absolute;
      left: -2px;
      top: 50%;
      transform: translateY(-50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--c-accent);
      box-shadow: 0 0 8px var(--c-accent);
    }

    .deco-circle {
      position: absolute;
      right: -5cqi;
      top: -12cqi;
      width: 23cqi;
      height: 23cqi;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.12);
    }

    .deco-circle::after {
      content: '';
      position: absolute;
      inset: 2.8cqi;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.08);
    }

    .deco-circle.cyberpunk {
      right: -4cqi;
      top: -10cqi;
      width: 22cqi;
      height: 22cqi;
      border: 1px solid rgba(239, 68, 68, 0.12);
    }

    .deco-circle.cyberpunk::after {
      inset: 2.5cqi;
      border: 1px solid rgba(239, 68, 68, 0.07);
    }

    .deco-blob {
      position: absolute;
      right: -8cqi;
      bottom: -8cqi;
      width: 30cqi;
      height: 30cqi;
      border-radius: 50%;
      background: radial-gradient(circle, var(--c-blob) 0%, transparent 70%);
    }

    .deco-blob.cyberpunk {
      right: -6cqi;
      bottom: -6cqi;
      width: 28cqi;
      height: 28cqi;
    }

    .deco-dots {
      position: absolute;
      right: 6.5cqi;
      bottom: 10cqi;
      display: grid;
      grid-template-columns: repeat(5, 0.25cqi);
      gap: 0.65cqi;
    }

    .deco-dots span {
      display: block;
      width: 0.25cqi;
      height: 0.25cqi;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
    }

    .deco-dots-cp {
      position: absolute;
      left: 6.5cqi;
      bottom: 2.5cqi;
      display: grid;
      grid-template-columns: repeat(8, 0.22cqi);
      gap: 0.5cqi;
    }

    .deco-dots-cp span {
      display: block;
      width: 0.22cqi;
      height: 0.22cqi;
      border-radius: 50%;
      background: rgba(239, 68, 68, 0.25);
    }

    .deco-code {
      position: absolute;
      right: 3cqi;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.3cqi;
      line-height: 1.9;
      color: rgba(239, 68, 68, 0.12);
      text-align: right;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }

    .deco-ai-sphere {
      position: absolute;
      right: 12cqi;
      top: 50%;
      transform: translateY(-50%);
      width: 25cqi;
      height: 25cqi;
      border-radius: 50%;
      border: 1px dashed rgba(255, 255, 255, 0.15);
      box-shadow: inset 0 0 20px var(--c-glow1), 0 0 30px var(--c-glow2);
      animation: spherePulse 10s infinite alternate;
    }

    .deco-ai-sphere::after {
      content: '';
      position: absolute;
      inset: 3cqi;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.1);
      background: radial-gradient(circle, var(--c-blob) 0%, transparent 70%);
    }

    @keyframes spherePulse {
      0% {
        transform: translateY(-50%) scale(1);
      }

      100% {
        transform: translateY(-50%) scale(1.05);
      }
    }

    .deco-circuit {
      position: absolute;
      right: 5cqi;
      bottom: 5cqi;
      display: flex;
      gap: 1.2cqi;
      align-items: flex-end;
    }

    .deco-circuit span {
      display: block;
      width: 0.6cqi;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    .deco-dots-sp {
      position: absolute;
      right: 6.5cqi;
      top: 8cqi;
      display: grid;
      grid-template-columns: repeat(4, 0.3cqi);
      gap: 0.8cqi;
    }

    .deco-dots-sp span {
      display: block;
      width: 0.3cqi;
      height: 0.3cqi;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
    }

    /* ── Minimal (简约风): centered text, ambient glow kept ── */
    .cover.deco-minimal .cover-content {
      text-align: center;
      padding-left: 8cqi;
      padding-right: 8cqi;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Cover content ── */
    .cover-content {
      position: relative;
      z-index: 1;
      padding-left: 10cqi;
      padding-right: 6.5cqi;
      width: 100%;
    }

    .cover .label {
      display: inline-block;
      font-size: 2cqi;
      letter-spacing: 0.2em;
      color: var(--c-label);
      margin-bottom: 1.6cqi;
      font-family: var(--c-font);
      background: rgba(255, 255, 255, 0.1);
      /* letter-spacing 会在末字后多出一格，左侧补同等宽度后左右留白对称 */
      padding: 0.35cqi 1cqi 0.35cqi calc(1cqi + 0.2em);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .cover h1 {
      font-size: 5cqi;
      font-weight: 900;
      color: var(--c-title);
      line-height: 1.5;
      margin-bottom: 1.6cqi;
      letter-spacing: -0.01em;
      max-width: 70cqi;
    }

    .cover .subtitle {
      font-size: 2.4cqi;
      color: var(--c-subtitle);
      line-height: 1.6;
      max-width: 70cqi;
      font-weight: 400;
    }

    .cover .meta {
      position: absolute;
      bottom: 1cqi;
      right: 1cqi;
      display: flex;
      align-items: center;
      gap: 1cqi;
      font-size: 2cqi;
      color: var(--c-meta);
      letter-spacing: 0.05em;
      z-index: 1;
    }

    .cover .meta::before,
    .cover .meta::after {
      content: '';
      width: 3cqi;
      height: 1px;
    }

    .cover .meta::before {
      background: linear-gradient(to right, transparent, var(--c-meta-line));
    }

    .cover .meta::after {
      background: linear-gradient(to left, transparent, var(--c-meta-line));
    }

    /* Cyberpunk overrides */
    .cover.deco-cyberpunk .label {
      display: inline-flex;
      align-items: center;
      gap: 0.6cqi;
      font-size: 1.7cqi;
      letter-spacing: 0.25em;
      background: rgba(220, 38, 38, 0.12);
      border-radius: 4px;
      border-color: rgba(239, 68, 68, 0.25);
      padding: 0.35cqi 1cqi 0.35cqi calc(1cqi + 0.25em);
    }

    .cover.deco-cyberpunk .label::before {
      content: '▶';
      font-size: 1.2cqi;
      color: var(--c-accent);
      opacity: 0.8;
    }

    .cover.deco-cyberpunk .meta {
      font-size: 1.85cqi;
      bottom: 2.8cqi;
      right: 3cqi;
    }

    .cover.deco-cyberpunk h1 {
      text-shadow: 0 0 40px rgba(239, 68, 68, 0.15);
    }

    /* Sphere overrides */
    .cover.deco-sphere .label {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 15px var(--c-glow1);
      backdrop-filter: blur(4px);
    }

    .cover.deco-sphere h1 {
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.15), 0 0 40px var(--c-glow1);
    }

    /* ── Presets strip (inside center, below cover) ── */
    .presets-strip {
      flex: none;
      padding: 10px 20px 12px;
      border-top: 1px solid #e5e7eb;
      background: #fff;
    }

    .presets-label {
      font-size: 9px;
      font-weight: 700;
      color: #b0b8c4;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-family: sans-serif;
      margin-bottom: 8px;
    }

    .presets-list {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: thin;
      scrollbar-color: #e5e7eb transparent;
    }

    .presets-list::-webkit-scrollbar {
      height: 3px;
    }

    .presets-list::-webkit-scrollbar-thumb {
      background: #e5e7eb;
      border-radius: 2px;
    }

    .preset-card {
      flex: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 6px;
      border: 1.5px solid #e5e7eb;
      border-radius: 7px;
      background: #f9fafb;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      width: 116px;
    }

    .preset-card:hover {
      border-color: #93c5fd;
      background: #f0f7ff;
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .preset-card.active {
      border-color: #2563eb;
      background: #eff6ff;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
    }

    .preset-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 5 / 2;
      border-radius: 3px;
      overflow: hidden;
    }

    .thumb-line {
      position: absolute;
      left: 10%;
      top: 15%;
      width: 2px;
      height: 70%;
      background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.65), transparent);
      border-radius: 1px;
    }

    .thumb-circle {
      position: absolute;
      right: -5%;
      top: -20%;
      width: 42%;
      height: 140%;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .thumb-hud {
      position: absolute;
      width: 18%;
      height: 55%;
      border-top: 1.5px solid currentColor;
      border-left: 1.5px solid currentColor;
      opacity: 0.75;
    }

    .thumb-hud.tl {
      top: 8%;
      left: 8%;
    }

    .thumb-hud.br {
      bottom: 8%;
      right: 8%;
      transform: rotate(180deg);
    }

    .thumb-scan {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(to bottom, transparent, transparent 3px, rgba(255, 255, 255, 0.04) 3px, rgba(255, 255, 255, 0.04) 4px);
    }

    .thumb-sphere {
      position: absolute;
      right: 8%;
      top: 50%;
      transform: translateY(-50%);
      width: 36%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px dashed rgba(255, 255, 255, 0.28);
    }

    .preset-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .preset-name {
      font-size: 11px;
      font-weight: 600;
      color: #111;
      font-family: sans-serif;
      line-height: 1.2;
    }

    .preset-tags {
      font-size: 9px;
      color: #9ca3af;
      font-family: sans-serif;
    }

    .preset-card.active .preset-name {
      color: #1d4ed8;
    }

    .preset-card.active .preset-tags {
      color: #60a5fa;
    }

    /* ── Mobile / narrow screens ── */
    @media (max-width: 900px) {

    function toggleVis(field) {
      visState[field] = !visState[field];

      const btn = document.getElementById('toggle-' + field);
      const input = document.getElementById(inputId);
      const el = document.querySelector('#cover-main ' + selector);
      btn.textContent = vis ? '隐藏' : '显示';

    // ── Decoration builders ────────────────────────────────────────────────
    function makeDiv(...classes) {
      const d = document.createElement('div');
      d.className = ['deco-el', ...classes].join(' ');
      return d;
    }

    function buildDecorations(style) {
      const cover = document.getElementById('cover-main');
      cover.querySelectorAll('.deco-el').forEach(el => el.remove());
      cover.classList.remove('deco-classic', 'deco-clean', 'deco-cyberpunk', 'deco-sphere', 'deco-minimal');
      cover.classList.add('deco-' + style);

      const anchor = cover.querySelector('.cover-content');
      const before = el => cover.insertBefore(el, anchor);

      if (style === 'clean') {
        /* 与极简几何相同版式，不插入网格/线/圆/点等装饰，仅保留封面渐变与文案 */
      } else if (style === 'classic') {
        before(makeDiv('deco-grid', 'classic'));
        before(makeDiv('deco-line'));
        before(makeDiv('deco-circle'));
        before(makeDiv('deco-blob'));
        const dots = makeDiv('deco-dots');
        for (let i = 0; i < 20; i++) dots.appendChild(document.createElement('span'));
        before(dots);

      } else if (style === 'cyberpunk') {
        before(makeDiv('deco-grid', 'cyberpunk'));
        before(makeDiv('deco-scan'));
        ['tl', 'tr', 'bl', 'br'].forEach(pos => before(makeDiv('deco-hud', `deco-hud-${pos}`)));

        before(makeDiv('deco-blob', 'cyberpunk'));

        before(code);
        const dots = makeDiv('deco-dots-cp');
        for (let i = 0; i < 24; i++) dots.appendChild(document.createElement('span'));
        before(dots);

      } else if (style === 'sphere') {
        before(makeDiv('deco-grid', 'sphere'));
        before(makeDiv('deco-line'));
        before(makeDiv('deco-ai-sphere'));
        before(makeDiv('deco-blob'));

        before(circuit);
        const dots = makeDiv('deco-dots-sp');
        for (let i = 0; i < 16; i++) dots.appendChild(document.createElement('span'));
        before(dots);

      }

      const wasMinimal = currentDeco === 'minimal';

      if (isMinimal && !wasMinimal) {

        if (visState.author) toggleVis('author');

      if (deco === 'classic') {
        const line = document.createElement('div'); line.className = 'thumb-line'; thumb.appendChild(line);
        const circle = document.createElement('div'); circle.className = 'thumb-circle'; thumb.appendChild(circle);
      } else if (deco === 'cyberpunk') {
        const scan = document.createElement('div'); scan.className = 'thumb-scan'; thumb.appendChild(scan);
        const tl = document.createElement('div'); tl.className = 'thumb-hud tl'; tl.style.color = s.accent; thumb.appendChild(tl);
        const br = document.createElement('div'); br.className = 'thumb-hud br'; br.style.color = s.accent; thumb.appendChild(br);
        const line = document.createElement('div'); line.className = 'thumb-line';
        line.style.background = `linear-gradient(to bottom,transparent,${s.accent},transparent)`;
        thumb.appendChild(line);
      } else if (deco === 'sphere') {
        const sphere = document.createElement('div'); sphere.className = 'thumb-sphere'; thumb.appendChild(sphere);
        const line = document.createElement('div'); line.className = 'thumb-line'; thumb.appendChild(line);
      } else if (deco === 'clean') {
        /* 仅配色光晕，无几何示意 */
      } else if (deco === 'minimal') {
        const bar = document.createElement('div');
        bar.style.cssText = 'position:absolute;left:20%;right:20%;top:50%;height:2px;margin-top:-1px;background:rgba(255,255,255,0.35);border-radius:1px';
        thumb.appendChild(bar);
      }
    }

    function getPresetVisibility(preset) {
      return {
        label: true,
        title: true,
        subtitle: preset.deco === 'minimal' ? false : true,
        author: preset.deco === 'minimal' ? false : true,
        ...(preset.vis || {})
      };
    }

    function applyPreset(idx) {
      const p = PRESETS[idx];
      document.querySelectorAll('.color-btn').forEach(b => b.classList.toggle('active', +b.dataset.scheme === p.scheme));
      applyColorScheme(p.scheme);
      document.querySelectorAll('.deco-btn').forEach(b => b.classList.toggle('active', b.dataset.deco === p.deco));
      applyDecoVis(p.deco);
      currentDeco = p.deco;
      buildDecorations(p.deco);
      const fontId = p.font && FONT_OPTIONS[p.font] ? p.font : DEFAULT_FONT;
      document.getElementById('sel-font').value = fontId;
      applyFontChoice(fontId);
      const targetVis = getPresetVisibility(p);
      Object.entries(targetVis).forEach(([field, show]) => {
        if (visState[field] !== show) toggleVis(field);
      });
      syncContent();
      syncAllSliders();
      document.querySelectorAll('.preset-card').forEach(c => c.classList.toggle('active', +c.dataset.preset === idx));
      scheduleSaveCover();
    }

    function initPresets() {
      const list = document.getElementById('presets-list');
      PRESETS.forEach((p, i) => {
        const card = document.createElement('button');
        card.className = 'preset-card' + (i === 0 ? ' active' : '');
        card.dataset.preset = i;
        const thumb = document.createElement('div'); thumb.className = 'preset-thumb';
        buildThumb(thumb, p.scheme, p.deco);
        const info = document.createElement('div'); info.className = 'preset-info';
        const name = document.createElement('span'); name.className = 'preset-name'; name.textContent = p.name;
        const tags = document.createElement('span'); tags.className = 'preset-tags';
        tags.textContent = COLOR_SCHEMES[p.scheme].name + ' · ' + DECO_LABELS[p.deco];
        card.title = [p.name, COLOR_SCHEMES[p.scheme].name, DECO_LABELS[p.deco], FONT_OPTIONS[p.font || DEFAULT_FONT].name].join(' · ');
        info.append(name, tags);
        card.append(thumb, info);
        card.addEventListener('click', () => applyPreset(i));
        list.appendChild(card);
      });
    }

    function normalizeHex(hex) {
      return (hex || '').trim().toLowerCase();
    }

    function readNumber(id) {
      return +document.getElementById(id).value;
    }

    function getActiveRatioButton() {
      return document.querySelector('.ratio-btn.active') || document.querySelector('.ratio-btn');
    }

    function getActiveSchemeButton() {
      return document.querySelector('.color-btn.active[data-scheme]');
    }

    function getCurrentBackgroundConfig() {
      const customBtn = document.getElementById('btn-custom-bg');
      if (customBtn.classList.contains('active')) {
        return {
          type: 'custom',
          value: normalizeHex(document.getElementById('inp-custom-bg').value),
        };
      }

      const activeSchemeBtn = getActiveSchemeButton();
      const idx = activeSchemeBtn ? +activeSchemeBtn.dataset.scheme : DEFAULT_SCHEME;
      return {
        type: 'scheme',
        index: idx,
        name: COLOR_SCHEMES[idx].name,
      };
    }

    function getDefaultTextColors(backgroundConfig) {
      if (backgroundConfig.type === 'custom') {
        return {
          label: '#ffffff',
          title: '#ffffff',
          subtitle: '#ffffff',
          meta: '#ffffff',
        };
      }

      const idx = backgroundConfig.index;
      const s = COLOR_SCHEMES[idx];
      const [label, subtitle, meta] = SCHEME_HEX[idx];
      const titleDefault =
        (s.title && /^#[0-9a-fA-F]{6}$/.test(s.title)) ? normalizeHex(s.title) : '#ffffff';
      return {
        label: normalizeHex(label),
        title: titleDefault,
        subtitle: normalizeHex(subtitle),
        meta: normalizeHex(meta),
      };
    }

    // ── Local storage (本机浏览器) ─────────────────────────────────────────
    const COVER_STORAGE_KEY = 'article-tools-cover-v1';
    let coverSaveTimer = null;

    function buildFullState() {
      const ratioBtn = getActiveRatioButton();
      const bg = getCurrentBackgroundConfig();
      return {
        v: 1,
        ratio: ratioBtn?.dataset.ratio || DEFAULT_RATIO,
        background: bg.type === 'scheme'
          ? { type: 'scheme', index: bg.index }
          : { type: 'custom', value: bg.value },
        font: getCurrentFontChoice(),
        deco: currentDeco,
        content: {
          label: document.getElementById('inp-label').value,
          title: document.getElementById('inp-title').value,
          subtitle: document.getElementById('inp-subtitle').value,
          author: document.getElementById('inp-author').value,
        },
        visibility: { ...visState },
        sliders: {
          label: readNumber('sld-label'),
          title: readNumber('sld-title'),
          subtitle: readNumber('sld-subtitle'),
          author: readNumber('sld-author'),
          width: readNumber('sld-width'),
          titleLH: readNumber('sld-title-lh'),
          subtitleLH: readNumber('sld-subtitle-lh'),
          titleMT: readNumber('sld-title-mt'),
          titleMB: readNumber('sld-title-mb'),
        },
        textColors: {
          label: normalizeHex(document.getElementById('clr-label').value),
          title: normalizeHex(document.getElementById('clr-title').value),
          subtitle: normalizeHex(document.getElementById('clr-subtitle').value),
          meta: normalizeHex(document.getElementById('clr-meta').value),
        },
      };
    }

    function scheduleSaveCover() {
      clearTimeout(coverSaveTimer);
      coverSaveTimer = setTimeout(() => {
        try {
          localStorage.setItem(COVER_STORAGE_KEY, JSON.stringify(buildFullState()));
          const hint = document.getElementById('local-save-hint');
          if (hint) {
            hint.style.color = '#16a34a';
            setTimeout(() => hint.style.removeProperty('color'), 900);
          }
        } catch (e) {
          console.warn('保存配置到本地失败', e);
        }
      }, 450);
    }

    function applyVisibilityFromState(v) {
      const fields = ['label', 'title', 'subtitle', 'author'];
      fields.forEach(field => {
        const show = !v || v[field] !== false;
        visState[field] = show;
        const { inputId, selector } = VIS_MAP[field];
        const btn = document.getElementById('toggle-' + field);
        const input = document.getElementById(inputId);
        const el = document.querySelector('#cover-main ' + selector);
        btn.textContent = show ? '隐藏' : '显示';
        btn.classList.toggle('on', show);
        if (input) input.disabled = !show;
        if (el) el.style.display = show ? '' : 'none';
      });
    }

    function applyTextColorsFromState(tc) {
      if (!tc) return;
      const map = { label: 'clr-label', title: 'clr-title', subtitle: 'clr-subtitle', meta: 'clr-meta' };
      const sel = { label: '.label', title: 'h1', subtitle: '.subtitle', meta: '.meta' };
      Object.keys(map).forEach(k => {
        if (!tc[k]) return;
        const inp = document.getElementById(map[k]);
        if (inp) inp.value = tc[k];
        const node = document.querySelector('#cover-main ' + sel[k]);
        if (node) node.style.color = tc[k];
      });
    }

    function applyRatioFromState(ratio) {
      const r = RATIO_PRESETS[ratio] ? ratio : DEFAULT_RATIO;
      document.querySelectorAll('.ratio-btn').forEach(b => b.classList.toggle('active', b.dataset.ratio === r));
      const btn = document.querySelector('.ratio-btn[data-ratio="' + r + '"]');
      const cover = document.getElementById('cover-main');
      if (!btn) return RATIO_PRESETS[DEFAULT_RATIO];
      cover.style.aspectRatio = r;
      document.getElementById('ratio-label').textContent = btn.dataset.label;
      const p = RATIO_PRESETS[r];
      cover.style.maxWidth = p.maxWidth || '';
      document.getElementById('sld-title').max = p.titleMax;
      document.getElementById('sld-subtitle').max = p.subtitleMax;
      document.getElementById('sld-author').max = p.authorMax;
      return p;
    }

    function applyBackgroundFromState(bg) {
      const customLbl = document.getElementById('btn-custom-bg');
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      customLbl.classList.remove('active');
      customLbl.classList.remove('has-custom');
      customLbl.style.background = '';
      if (!bg) {
        document.querySelector('.color-btn[data-scheme="' + DEFAULT_SCHEME + '"]').classList.add('active');
        applyColorScheme(DEFAULT_SCHEME);
        return;
      }
      if (bg.type === 'custom' && bg.value) {
        document.getElementById('inp-custom-bg').value = bg.value;
        customLbl.style.background = bg.value;
        customLbl.classList.add('has-custom');
        customLbl.classList.add('active');
        applyCustomColor(bg.value);
        return;
      }
      const idx = typeof bg.index === 'number' ? bg.index : DEFAULT_SCHEME;
      const safeIdx = Math.min(Math.max(0, idx), COLOR_SCHEMES.length - 1);
      const schemeBtn = document.querySelector('.color-btn[data-scheme="' + safeIdx + '"]');
      if (schemeBtn) schemeBtn.classList.add('active');
      applyColorScheme(safeIdx);
    }

    function applySavedState(state) {
      if (!state || state.v !== 1) return false;
      const p = applyRatioFromState(state.ratio);
      const sl = state.sliders || {};
      const setN = (id, val, fb) => {
        const el = document.getElementById(id);
        if (!el) return;
        const n = val != null && val !== '' ? +val : NaN;
        el.value = Number.isFinite(n) ? n : fb;
      };
      setN('sld-label', sl.label, p.labelSize);
      setN('sld-title', sl.title, p.titleSize);
      setN('sld-subtitle', sl.subtitle, p.subtitleSize);
      setN('sld-author', sl.author, p.authorSize);
      setN('sld-width', sl.width, p.width);
      setN('sld-title-lh', sl.titleLH, p.titleLH);
      setN('sld-subtitle-lh', sl.subtitleLH, p.subtitleLH);
      setN('sld-title-mt', sl.titleMT, p.titleMT);
      setN('sld-title-mb', sl.titleMB, p.titleMB);

      applyBackgroundFromState(state.background);

      const fontId = state.font && FONT_OPTIONS[state.font] ? state.font : DEFAULT_FONT;
      document.getElementById('sel-font').value = fontId;
      applyFontChoice(fontId);

      const decoOk = ['classic', 'clean', 'cyberpunk', 'sphere', 'minimal'];
      const deco = decoOk.includes(state.deco) ? state.deco : DEFAULT_DECO;
      document.querySelectorAll('.deco-btn').forEach(b => b.classList.toggle('active', b.dataset.deco === deco));
      currentDeco = deco;
      buildDecorations(deco);

      const c = state.content || {};
      if (c.label != null) document.getElementById('inp-label').value = c.label;
      if (c.title != null) document.getElementById('inp-title').value = c.title;
      if (c.subtitle != null) document.getElementById('inp-subtitle').value = c.subtitle;
      if (c.author != null) document.getElementById('inp-author').value = c.author;

      applyVisibilityFromState(state.visibility);
      applyTextColorsFromState(state.textColors);
      syncContent();
      syncAllSliders();
      return true;
    }

    function tryLoadSavedCover() {
      try {
        const raw = localStorage.getItem(COVER_STORAGE_KEY);
        if (!raw) return false;
        return applySavedState(JSON.parse(raw));
      } catch (e) {
        console.warn('读取本地配置失败', e);
        return false;
      }
    }

    // ── Reset ──────────────────────────────────────────────────────────────
    function resetAll() {
      try {
        localStorage.removeItem(COVER_STORAGE_KEY);
      } catch (e) { /* ignore */ }
      document.getElementById('inp-label').value = DEFAULT.label;
      document.getElementById('inp-title').value = DEFAULT.title;
      document.getElementById('inp-subtitle').value = DEFAULT.subtitle;
      document.getElementById('inp-author').value = DEFAULT.author;
      syncContent();
      document.querySelectorAll('.ratio-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
      document.querySelectorAll('.color-btn').forEach(b => b.classList.toggle('active', +b.dataset.scheme === 6));
      document.querySelectorAll('.deco-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
      document.querySelectorAll('.preset-card').forEach((c, i) => c.classList.toggle('active', i === 0));
      const cover = document.getElementById('cover-main');
      cover.style.aspectRatio = '1200/480';
      cover.style.maxWidth = '';
      document.getElementById('ratio-label').textContent = '5:2 · 1200×480';
      applyColorScheme(6);
      const customLbl = document.getElementById('btn-custom-bg');
      customLbl.style.background = '';
      customLbl.classList.remove('has-custom');
      document.getElementById('inp-custom-bg').value = '#1d4ed8';
      currentDeco = 'classic';
      buildDecorations('classic');
      const defaultPresetFont = PRESETS[0]?.font || DEFAULT_FONT;
      document.getElementById('sel-font').value = defaultPresetFont;
      applyFontChoice(defaultPresetFont);
      Object.keys(visState).forEach(f => { if (!visState[f]) toggleVis(f); });
      const p = RATIO_PRESETS['1200/480'];
      document.getElementById('sld-title').max = p.titleMax;
      document.getElementById('sld-subtitle').max = p.subtitleMax;
      document.getElementById('sld-author').max = p.authorMax;
      const set = (id, v) => document.getElementById(id).value = v;
      set('sld-label', p.labelSize); set('sld-title', p.titleSize); set('sld-subtitle', p.subtitleSize);
      set('sld-author', p.authorSize);
      set('sld-width', p.width); set('sld-title-lh', p.titleLH); set('sld-subtitle-lh', p.subtitleLH);
      set('sld-title-mt', p.titleMT); set('sld-title-mb', p.titleMB);
      syncAllSliders();
      scheduleSaveCover();
    }

    // ── Export ─────────────────────────────────────────────────────────────
    function captureEl(fn) {
      const el = document.getElementById('cover-main');
      const prev = el.style.maxWidth;
      el.style.maxWidth = 'none';
      const rect = el.getBoundingClientRect();
      const options = { pixelRatio: 2, width: Math.round(rect.width), height: Math.round(rect.height) };
      const fontsReady = document.fonts?.ready || Promise.resolve();
      return fontsReady
        .then(() => fn(el, options))
        .finally(() => { el.style.maxWidth = prev; });
    }

    function exportPng() {
      captureEl(htmlToImage.toPng).then(url => {
        const a = document.createElement('a'); a.download = 'cover.png'; a.href = url; a.click();
      }).catch(err => alert('截图失败：' + err));
    }

    function copyImage() {
      captureEl(htmlToImage.toBlob)
        .then(blob => navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]))
        .then(() => alert('已复制到剪贴板'))
        .catch(err => alert('复制失败（若需复制图片，请使用 HTTPS 或 localhost，并允许剪贴板权限）：' + err));
    }

    // ── Init ───────────────────────────────────────────────────────────────
    initFontPicker();
    initPresets();

    const layoutRoot = document.querySelector('.layout');
    if (layoutRoot) {
      layoutRoot.addEventListener('input', scheduleSaveCover);
      layoutRoot.addEventListener('change', scheduleSaveCover);
    }

    if (!tryLoadSavedCover()) {
      document.getElementById('inp-label').value = DEFAULT.label;
      document.getElementById('inp-title').value = DEFAULT.title;
      document.getElementById('inp-subtitle').value = DEFAULT.subtitle;
      document.getElementById('inp-author').value = DEFAULT.author;
      syncContent();
      syncAllSliders();
      applyPreset(0);
    } else {
      document.querySelectorAll('.preset-card').forEach(c => c.classList.remove('active'));
    }
  </script>
</body>

</html>
