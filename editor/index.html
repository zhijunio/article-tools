<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f0f2f5">
  <link rel="icon" href="../favicon.ico" sizes="any">
  <title>Markdown 排版器</title>

  <!-- Markdown 渲染库 -->
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.0.0/dist/markdown-it.min.js"></script>

  <!-- 代码高亮库 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/es/highlight.min.js"></script>

  <!-- Turndown - HTML 转 Markdown 库 -->
  <script src="https://cdn.jsdelivr.net/npm/turndown@7.2.0/dist/turndown.js"></script>

  <!-- Vue.js -->
  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.15/dist/vue.global.prod.js"></script>

  <!-- html2canvas - 用于生成小红书图片 -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <link rel="stylesheet" href="app.css?v=33">
</head>
<body>
  <div id="app">
    <!-- 顶栏（与 cover/index.html 一致） -->
    <header class="app-header">
      <a class="home-link" href="../index.html" title="工具箱首页">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1.5 6.5L7.5 1.5L13.5 6.5V13.5H9.5V9.5H5.5V13.5H1.5V6.5Z"/>
        </svg>
      </a>
      <span class="header-logo">Markdown 排版器 · Editor</span>
      <span class="header-ratio">{{ markdownInput.length }} 字符</span>
      <div class="header-spacer"></div>
      <div class="app-header-tools">
        <div class="editor-actions">
          <label for="file-upload" class="upload-label upload-label-top">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <span>上传 MD 文件</span>
            <input type="file" id="file-upload" accept=".md,.markdown" @change="handleFileUpload" style="display: none;">
          </label>
        </div>
        <div class="header-style-tools">
          <span class="header-style-label">样式</span>
          <select v-model="currentStyle" class="header-style-select">
            <template v-for="grp in orderedStyleOptionGroups" :key="grp.label">
              <optgroup :label="grp.label">
                <option
                  v-for="[key, style] in grp.entries"
                  :key="key"
                  :value="key"
                >
                  {{ style.name || key }}
                </option>
              </optgroup>
            </template>
          </select>
        </div>
        <div class="header-copy-actions">
          <button
            type="button"
            class="btn btn-primary"
            :disabled="!renderedContent"
            @click="copyToClipboard"
          >
            复制到公众号
          </button>
          <button
                  type="button"
                  class="btn btn-primary"
                  :disabled="!renderedContent"
                  @click="copyToXArticles"
          >
            复制到 X
          </button>
        </div>
      </div>
    </header>

    <!-- 主内容区 -->
    <div class="main-content">
      <!-- 编辑器面板 -->
      <div class="editor-panel">
        <div class="markdown-input-container">
          <textarea
            ref="editorTextarea"
            v-model="markdownInput"
            class="markdown-input"
            rows="1"
            :class="{ 'drag-over': isDraggingOver }"
            @paste="handleSmartPaste"
            @drop="handleDrop"
            @dragover="handleDragOver"
            @dragenter="handleDragEnter"
            @dragleave="handleDragLeave"
            placeholder="# 在这里粘贴或输入 Markdown 内容

## 功能特点

- **实时预览**：所见即所得
- **多种样式**：随意切换
- **智能粘贴**：支持从飞书、Notion、Word 直接粘贴
- **图片支持**：直接粘贴或拖拽图片，自动上传
- **一键复制**：直接粘贴到公众号

💡 提示：可以直接粘贴截图，或拖拽图片文件到这里"
            spellcheck="false"
          ></textarea>
        </div>
      </div>

      <!-- 预览面板 -->
      <div class="preview-panel">
        <!-- 公众号预览模式 -->
        <div ref="previewScrollRoot" class="preview-content">
          <div v-if="!renderedContent" class="empty-state">
            <svg class="empty-state-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <h3>开始编辑</h3>
            <p>左侧输入 Markdown，右侧实时预览</p>
          </div>
          <div v-else class="preview-container" v-html="renderedContent"></div>
        </div>

        <!-- 小红书预览模式（已隐藏） -->
        <!-- <div v-if="previewMode === 'xiaohongshu'" class="xiaohongshu-preview">
          <div class="xiaohongshu-controls">

      </div>
    </div>

    <!-- Toast 提示 -->
    <div v-if="toast.show" class="toast" :class="toast.type">
      {{ toast.message }}
    </div>
  </div>

  <!-- 加载脚本 -->
  <script src="styles.js?v=5"></script>
  <script src="app.js?v=16"></script>
</body>
</html>
